name: Release

# Tag-driven release pipeline: push a `vX.Y.Z` tag and this builds, signs, notarizes,
# and publishes the .dmg to a GitHub Release — the same steps as scripts/release.sh, in CI.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   MACOS_CERT_P12_BASE64  — Developer ID Application cert+key exported as .p12, then `base64 -i cert.p12`
#   MACOS_CERT_PASSWORD    — password used when exporting that .p12
#   MACOS_SIGN_IDENTITY    — e.g. "Developer ID Application: Your Name (TEAMID)"
#   KEYCHAIN_PASSWORD      — any throwaway password for the temporary CI keychain
#   ASC_KEY_P8_BASE64      — App Store Connect API key (.p8) as `base64 -i AuthKey_XXXX.p8`
#   ASC_KEY_ID             — the API key id (the XXXX in AuthKey_XXXX.p8)
#   ASC_ISSUER_ID          — the API key issuer UUID

on:
  push:
    tags: ["v*"]

permissions:
  contents: write          # create the Release + upload the .dmg

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history → stable build number

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Import Developer ID certificate
        env:
          CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          CERT_PASSWORD:   ${{ secrets.MACOS_CERT_PASSWORD }}
          KC_PASSWORD:     ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KC="$RUNNER_TEMP/build.keychain"
          security create-keychain -p "$KC_PASSWORD" "$KC"
          security set-keychain-settings -lut 3600 "$KC"
          security unlock-keychain -p "$KC_PASSWORD" "$KC"
          echo "$CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KC" -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KC_PASSWORD" "$KC"
          security list-keychains -d user -s "$KC" $(security list-keychains -d user | tr -d '"')
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Stage notary API key
        env:
          ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
          ASC_KEY_ID:        ${{ secrets.ASC_KEY_ID }}
        run: |
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          echo "$ASC_KEY_P8_BASE64" | base64 --decode \
            > "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"

      - name: Build, sign, notarize & release
        env:
          GH_TOKEN:      ${{ github.token }}
          SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
          ASC_KEY_ID:    ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          export ASC_KEY_PATH="$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"
          zsh scripts/release.sh "${GITHUB_REF_NAME#v}"
